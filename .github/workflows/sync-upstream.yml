name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/irm123gard/Emby-Mate.git || git remote set-url upstream https://github.com/irm123gard/Emby-Mate.git
          git fetch upstream --prune

      - name: Sync from upstream and keep local config
        run: |
          git checkout main
          cp .github/workflows/sync-upstream.yml /tmp/sync-upstream.yml
          cp wrangler.jsonc /tmp/wrangler.jsonc
          git reset --hard upstream/main
          mkdir -p .github/workflows
          cp /tmp/sync-upstream.yml .github/workflows/sync-upstream.yml
          cp /tmp/wrangler.jsonc wrangler.jsonc
          if ! git diff --quiet; then
            git add -A
            git commit -m "sync: upstream main (keep local config)"
            git push origin main
          else
            echo "Already up to date"
          fi
