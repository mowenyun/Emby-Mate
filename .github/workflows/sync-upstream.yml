name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/irm123gard/Emby-Mate.git || git remote set-url upstream https://github.com/irm123gard/Emby-Mate.git
          git fetch upstream --prune

      - name: Sync main but keep local config
        run: |
          git checkout main
          git merge --ff-only upstream/main || true
          git checkout HEAD -- .github/workflows/sync-upstream.yml
          git checkout HEAD -- wrangler.jsonc
          if ! git diff --quiet -- dist/worker.js worker-v2.4.9.js README.md CHANGELOG.md; then
            git add -A
            git commit -m "sync: upstream main (keep local config)"
            git push origin main
          else
            echo "No deployable file changes"
          fi
